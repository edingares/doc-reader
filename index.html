<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocReader - 文档阅读器</title>
<!-- Tailwind CSS v3 -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Font Awesome -->
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js"></script>
<!-- Mammoth.js for Word documents -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                primary: '#3B82F6',
                secondary: '#6366F1',
                dark: '#1E293B',
                light: '#F8FAFC'
            }
        }
    }
}
</script>

<style type="text/tailwindcss">
@layer utilities {
    .content-auto { content-visibility: auto; }
    .card-shadow { box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.1); }
}
</style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-dark">
<!-- 顶部导航 -->
<header class="bg-white shadow-sm sticky top-0 z-10">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="fa fa-file-text-o text-primary text-2xl"></i>
            <h1 class="text-xl font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">文档阅读器 DocReader</h1>
        </div>
    </div>
</header>

<main class="container mx-auto px-4 py-8 max-w-4xl">
    <!-- 上传区域 -->
    <div class="bg-white rounded-xl card-shadow p-8 mb-8">
        <div class="text-center mb-6">
            <i class="fa fa-cloud-upload text-primary text-5xl mb-4"></i>
            <h2 class="text-2xl font-bold mb-2">上传文档解析</h2>
            <p class="text-gray-500">支持 PDF / Word(docx) / TXT 文本文件，云端高速解析</p >
        </div>

        <div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-primary transition-colors cursor-pointer" id="dropArea">
            <input type="file" id="fileInput" accept=".pdf,.docx,.txt" class="hidden">
            <button id="uploadBtn" class="bg-primary hover:bg-primary/90 text-white px-6 py-3 rounded-lg font-medium transition-all shadow-md hover:shadow-lg">
                <i class="fa fa-plus mr-2"></i>选择文件上传
            </button>
            <p class="mt-4 text-gray-400">或直接拖拽文件到此处上传</p >
        </div>
    </div>

    <!-- 加载状态 -->
    <div id="loadingBox" class="hidden text-center py-12">
        <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-primary border-t-transparent"></div>
        <p class="mt-4 text-primary font-medium">正在云端解析文档，请稍候...</p >
    </div>

    <!-- 解析结果区域 -->
    <div id="resultBox" class="hidden bg-white rounded-xl card-shadow p-6 mt-8">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-bold"><i class="fa fa-file-text-o mr-2 text-primary"></i>解析正文内容</h3>
            <button id="copyBtn" class="bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded text-sm transition-colors">
                <i class="fa fa-copy mr-1"></i>复制全文
            </button>
        </div>
        <div id="resultText" class="bg-gray-50 rounded-lg p-6 max-h-[600px] overflow-y-auto whitespace-pre-line leading-relaxed"></div>
    </div>
</main>

<footer class="mt-12 py-6 text-center text-gray-400 text-sm">
    <p>DocReader 文档在线阅读器 · 云端后端解析服务</p >
</footer>

<script>
// ✅ 这里已经帮你改成你的最新后端地址！不用你改了！
const apiUrl = "https://doc-reader-backend-sbcj.vercel.app/api/parse";

const uploadBtn = document.getElementById('uploadBtn');
const fileInput = document.getElementById('fileInput');
const dropArea = document.getElementById('dropArea');
const loadingBox = document.getElementById('loadingBox');
const resultBox = document.getElementById('resultBox');
const resultText = document.getElementById('resultText');
const copyBtn = document.getElementById('copyBtn');

// 点击上传按钮
uploadBtn.addEventListener('click', () => fileInput.click());

// 文件选择
fileInput.addEventListener('change', handleFileSelect);

// 拖拽上传
['dragenter','dragover','dragleave','drop'].forEach(ev=>{
    dropArea.addEventListener(ev,e=>e.preventDefault());
});
['dragenter','dragover'].forEach(ev=>{
    dropArea.addEventListener(ev,()=>dropArea.classList.add('border-primary'));
});
['dragleave','drop'].forEach(ev=>{
    dropArea.addEventListener(ev,()=>dropArea.classList.remove('border-primary'));
});
dropArea.addEventListener('drop',e=>{
    const file = e.dataTransfer.files[0];
    if(file) handleFile(file);
});

// 处理文件上传解析
async function handleFileSelect(e){
    const file = e.target.files[0];
    if(file) handleFile(file);
}

async function handleFile(file){
    const type = file.name.split('.').pop().toLowerCase();
    if(!['pdf','docx','txt'].includes(type)){
        alert('仅支持 PDF / DOCX / TXT 文件！');
        return;
    }

    loadingBox.classList.remove('hidden');
    resultBox.classList.add('hidden');

    try{
        // 读取文件转base64
        const buffer = await file.arrayBuffer();
        const base64 = btoa(String.fromCharCode(...new Uint8Array(buffer)));
        
        // 调用你的后端接口
        const res = await fetch(apiUrl,{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({type,file:{data:base64}})
        });

        const data = await res.json();
        if(!res.ok) throw new Error(data.error || '解析失败');

        // 显示结果
        resultText.innerText = data.text;
        resultBox.classList.remove('hidden');
    }catch(err){
        alert('文档解析出错：'+err.message);
        console.error(err);
    }finally{
        loadingBox.classList.add('hidden');
    }
}

// 复制全文
copyBtn.addEventListener('click',()=>{
    navigator.clipboard.writeText(resultText.innerText);
    alert('全文已复制！');
});
</script>
</body>
</html>
